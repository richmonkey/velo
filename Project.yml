name: VeloChat
options:
  bundleIdPrefix: com.velo
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
settings:
  base:
    DEVELOPMENT_TEAM: Z53L5682S3
    CODE_SIGN_STYLE: Automatic 
    SWIFT_VERSION: "5.9"

packages:
  XMTPiOS:
    url: https://github.com/xmtp/xmtp-ios
    exactVersion: 4.9.0

targets:
  VeloChat:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: VeloChat
    dependencies:
      - package: XMTPiOS
        product: XMTPiOS
    info:
      path: VeloChat/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: VeloChat
        NSCameraUsageDescription: "Camera access is needed to scan QR codes for adding contacts"
        NSMicrophoneUsageDescription: "Microphone access is needed to record voice messages"
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    entitlements:
      path: VeloChat/VeloChat.entitlements
      properties:
        aps-environment: development
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.velo.chat
        TARGETED_DEVICE_FAMILY: "1,2"

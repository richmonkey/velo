name: VeloChat
options:
  bundleIdPrefix: com.daibou007
  deploymentTarget:
    iOS: "17.6"
  createIntermediateGroups: true
settings:
  base:
    DEVELOPMENT_TEAM: Z53L5682S3
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  XMTPiOS:
    url: https://github.com/xmtp/xmtp-ios
    exactVersion: 4.9.0

targets:
  VeloChat:
    type: application
    platform: iOS
    deploymentTarget: "17.6"
    sources:
      - path: VeloChat
    dependencies:
      - package: XMTPiOS
        product: XMTPiOS
    info:
      path: VeloChat/Info.plist
      properties:
        UILaunchStoryboardName: LaunchScreen
        CFBundleDisplayName: VeloChat
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSApplicationCategoryType: public.app-category.utilities
        NSCameraUsageDescription: "Camera access is needed to scan QR codes for adding contacts"
        NSMicrophoneUsageDescription: "Microphone access is needed to record voice messages"
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    entitlements:
      path: VeloChat/VeloChat.entitlements
      properties:
        aps-environment: development
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.daibou007.velochat
        TARGETED_DEVICE_FAMILY: "1"
